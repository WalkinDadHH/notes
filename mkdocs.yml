site_name: WalkinDadHH's Notebook
site_description: 能环专业学习笔记，愿对学弟学妹有所帮助
site_author: WalkinDadHH
docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  font: false   # 禁用 Google Fonts，改用 CDN 加载
  icon:
    logo: material/notebook-outline
  favicon: https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/svgs/solid/book.svg
  features:
    - navigation.tabs
    - navigation.tracking
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

extra_css:
  - stylesheets/fonts.css
  - stylesheets/extra.css

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-\.]+'

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      title: 目录
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md
  - 数学:
    - math/index.md
  - 物理:
    - physics/index.md
    - 大学物理（下）:
      - 光学:
        - physics/optics/index.md
        - 几何光学: physics/optics/geometrical-optics.md
        - 光的干涉: physics/optics/interference.md
  - 化学:
    - chemistry/index.md
  - 专业课程:
    - 专业基础课:
      - major/foundation/index.md
      - 工程力学: major/foundation/engineering-mechanics.md
  - 关于: about.md
